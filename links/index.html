<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sopro Life — Links e Agendamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://soprolife.com.br/links/">
  <meta name="description" content="Agende sua espirometria, fale no WhatsApp ou marque uma consulta médica online com a Sopro Life. Todos os links da Sopro Life em um só lugar.">
  <meta name="theme-color" content="#0b2239">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sopro Life — Links e Agendamento">
  <meta property="og:description" content="Saúde respiratória com cuidado de verdade. Escolha como podemos te ajudar.">
  <meta property="og:url" content="https://soprolife.com.br/links/">
  <meta property="og:image" content="https://soprolife.com.br/img/logo.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260522b">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260522b">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260522b">
  <link rel="shortcut icon" href="/favicon.ico?v=20260522b">
  <style>
    :root{
      /* Paleta da logo Sopro Life (navy + teal) */
      --sl-primary: #0b2239;       /* navy */
      --sl-primary-dark: #081829;
      --sl-accent: #1eb5ab;        /* teal vivo */
      --sl-accent-dark: #18a197;
      --sl-bg-soft: #f2fbfb;
      --sl-bg-strong: #e3f6f6;
      --sl-text-dark: #0b2239;
      --sl-text-soft: #476172;
      --sl-green: #08a94f;         /* WhatsApp / agendar */
      --sl-radius-lg: 18px;
      --sl-shadow-soft: 0 14px 35px rgba(0,0,0,0.08);
      --sl-shadow-light: 0 8px 20px rgba(0,0,0,0.05);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,Arial,sans-serif;
      color:var(--sl-text-dark);
      background:radial-gradient(circle at top,#ebfbff 0,#ffffff 60%);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit;text-decoration:none}

    .sl-links-page{
      max-width:520px;
      margin:0 auto;
      padding:36px 20px 56px;
      display:flex;
      flex-direction:column;
      align-items:stretch;
    }

    /* Cabeçalho com logo */
    .sl-links-header{
      text-align:center;
      margin-bottom:22px;
    }
    .sl-links-header img{
      height:96px;
      width:auto;
      display:inline-block;
    }
    .sl-links-intro{
      text-align:center;
      font-size:1.05rem;
      line-height:1.5;
      color:var(--sl-text-soft);
      margin:0 auto 28px;
      max-width:420px;
    }
    .sl-links-intro strong{color:var(--sl-primary)}

    /* Botões principais */
    .sl-links-stack{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .sl-link-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-align:center;
      width:100%;
      min-height:60px;
      padding:18px 22px;
      border-radius:999px;
      font-size:1.08rem;
      font-weight:600;
      letter-spacing:.01em;
      line-height:1.25;
      box-shadow:var(--sl-shadow-soft);
      transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;
    }
    .sl-link-btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(0,0,0,.16)}
    .sl-link-btn:active{transform:translateY(0)}

    /* Botão primário (teal navy gradient) */
    .sl-link-btn--primary{
      background:linear-gradient(135deg,var(--sl-accent),var(--sl-accent-dark));
      color:#fff;
    }
    /* Botão de destaque WhatsApp (verde) */
    .sl-link-btn--whatsapp{
      background:var(--sl-green);
      color:#fff;
    }
    .sl-link-btn--whatsapp:hover{filter:brightness(0.97)}
    .sl-link-icon{width:22px;height:22px;flex:0 0 auto}

    /* Divisor */
    .sl-links-divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:30px 0 18px;
      color:var(--sl-text-soft);
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.16em;
    }
    .sl-links-divider::before,
    .sl-links-divider::after{
      content:"";
      flex:1;
      height:1px;
      background:linear-gradient(90deg,transparent,#cfe7e8,transparent);
    }

    /* Botões secundários */
    .sl-links-secondary{
      display:flex;
      flex-direction:column;
      gap:11px;
    }
    .sl-link-btn--ghost{
      background:#fff;
      color:var(--sl-primary);
      border:1px solid rgba(30,181,171,.30);
      box-shadow:var(--sl-shadow-light);
      min-height:52px;
      font-size:1rem;
      padding:14px 20px;
    }
    .sl-link-btn--ghost:hover{
      background:var(--sl-bg-soft);
      box-shadow:var(--sl-shadow-soft);
    }

    .sl-links-footer{
      text-align:center;
      margin-top:34px;
      font-size:.82rem;
      color:var(--sl-text-soft);
    }
    .sl-links-footer a:hover{color:var(--sl-primary);text-decoration:underline}

    @media (max-width:480px){
      .sl-links-page{padding:28px 16px 48px}
      .sl-links-header img{height:84px}
      .sl-links-intro{font-size:1rem}
      .sl-link-btn{font-size:1.02rem;min-height:58px}
    }
  </style>
</head>
<body>
  <main class="sl-links-page">
    <header class="sl-links-header">
      <a href="https://soprolife.com.br/" aria-label="Sopro Life - página inicial">
        <img src="/img/logo.png" alt="Sopro Life" width="240" height="96">
      </a>
    </header>

    <p class="sl-links-intro">
      <strong>Saúde respiratória com cuidado de verdade.</strong><br>
      Escolha como podemos te ajudar:
    </p>

    <nav class="sl-links-stack" aria-label="Atalhos principais">
      <a class="sl-link-btn sl-link-btn--primary"
         href="https://soprolife.com.br/espirometria-rio-de-janeiro/">
        Agendar espirometria
      </a>

      <a class="sl-link-btn sl-link-btn--primary"
         href="https://soprolife.com.br/espirometria-domiciliar-rio-de-janeiro/">
        Espirometria em casa (domiciliar)
      </a>

      <a class="sl-link-btn sl-link-btn--primary"
         href="https://soprolife.com.br/telemedicina/">
        Consulta Médica Online (sintomas respiratórios)
      </a>

      <a class="sl-link-btn sl-link-btn--whatsapp"
         href="https://api.whatsapp.com/send?phone=5521998901775&amp;text=Ol%C3%A1%21%20Vim%20pelo%20Instagram%20e%20gostaria%20de%20informa%C3%A7%C3%B5es."
         target="_blank" rel="noopener">
        <svg class="sl-link-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#fff" d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.96-.94 1.16-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48s1.06 2.88 1.21 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.62.71.23 1.36.2 1.87.12.57-.08 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35zM12 2A10 10 0 002 12c0 1.77.46 3.43 1.27 4.88L2 22l5.25-1.38A9.96 9.96 0 0012 22a10 10 0 000-20zm0 18.3c-1.6 0-3.1-.43-4.4-1.18l-.31-.18-3.12.82.83-3.04-.2-.32A8.26 8.26 0 013.7 12 8.3 8.3 0 1112 20.3z"/>
        </svg>
        Falar no WhatsApp
      </a>
    </nav>

    <div class="sl-links-divider">Mais sobre a Sopro Life</div>

    <nav class="sl-links-secondary" aria-label="Links secundários">
      <a class="sl-link-btn sl-link-btn--ghost"
         href="https://soprolife.com.br/conheca/">
        Conheça a Sopro Life
      </a>
      <a class="sl-link-btn sl-link-btn--ghost"
         href="https://www.instagram.com/soprolife/" target="_blank" rel="noopener">
        Instagram
      </a>
      <a class="sl-link-btn sl-link-btn--ghost"
         href="https://www.youtube.com/@SoproLife" target="_blank" rel="noopener">
        YouTube
      </a>
    </nav>

    <footer class="sl-links-footer">
      <a href="https://soprolife.com.br/">soprolife.com.br</a>
    </footer>
  </main>
</body>
</html>
